# Copy to config.yaml and customize.

# Run every hour when using the posting window filter.
schedule: "0 * * * *"

# Role filter — matches job title only (case-insensitive substring).
keywords:
  - "software engineer"
  - "software developer"
  - "java developer"
  - "senior software engineer"
  - "backend engineer"
  - "back end engineer"

filters:
  us_only: true                      # United States locations only
  posted_min_hours: 1                # At least 1 hour ago (when post time exists)
  posted_max_hours: 25               # At most 25 hours ago (when post time exists)
  allow_missing_posted_time: true    # Still alert on career portals without a post date
  experience_filter_enabled: true
  # Keep mid-level / early-career band (about 1–5 years required)
  experience_min_years: 1
  experience_max_years: 5

request_timeout: 30
user_agent: "JobOpeningMonitor/1.0 (+personal job alert bot)"

rate_limit:
  requests_per_second: 1.0
  max_retries: 3
  backoff_seconds: 1.5

# Phase 5 — smart alerts with optional RAG match scores
alerts:
  profile_id: 1
  min_match_score: 70
  include_match_scores: true
  channels:
    email: true
    slack: false
    discord: false
    telegram: false

apply_agent:
  enabled: true
  min_match_score: 85
  max_applications_per_day: 25
  timezone: America/Chicago
  base_resume_path: data/resumes/base_resume.pdf
  skip_clearance: true
  auto_submit: true
  playwright_headless: true
  ats_priority:
    - greenhouse
    - ashby
    - workday
    - oracle
    - amazon
    - lever
