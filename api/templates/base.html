<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Job Intelligence Monitor{% endblock %}</title>
  <style>
    :root { --bg:#0f1419; --card:#1a2332; --text:#e7ecf3; --muted:#9aa7b8; --accent:#3b82f6; --good:#22c55e; --bad:#ef4444; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: ui-sans-serif, system-ui, sans-serif; background:var(--bg); color:var(--text); line-height:1.5; }
    a { color:var(--accent); text-decoration:none; }
    header { padding:1rem 1.5rem; border-bottom:1px solid #243044; display:flex; gap:1rem; align-items:center; flex-wrap:wrap; }
    header nav a { margin-right:1rem; color:var(--muted); }
    header nav a:hover { color:var(--text); }
    main { max-width:1100px; margin:0 auto; padding:1.5rem; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:1rem; }
    .card { background:var(--card); border:1px solid #243044; border-radius:12px; padding:1rem; }
    .stat { font-size:2rem; font-weight:700; }
    .muted { color:var(--muted); font-size:.9rem; }
    table { width:100%; border-collapse:collapse; }
    th, td { text-align:left; padding:.6rem .4rem; border-bottom:1px solid #243044; vertical-align:top; }
    .score { color:var(--good); font-weight:700; white-space:nowrap; }
    input[type="text"], input[type="file"], input[type="url"] {
      background:#111827; border:1px solid #374151; color:var(--text);
      padding:.5rem .75rem; border-radius:8px;
    }
    button {
      background:var(--accent); color:white; border:none; padding:.5rem .9rem;
      border-radius:8px; cursor:pointer; font-weight:600;
    }
    button:disabled { opacity:.7; cursor:wait; }
    .hero h1 { font-size:clamp(1.6rem, 4vw, 2.4rem); line-height:1.2; margin:0 0 .75rem; }
    .hero em { color:var(--accent); font-style:normal; }
    .hero-sub { max-width:40rem; font-size:1.05rem; }
    .upload-card { max-width:560px; margin-top:1.25rem; }
    .error-card { border-color:var(--bad); color:#fecaca; margin:1rem 0; }
    .steps { padding-left:1.2rem; }
    .steps li { margin:.4rem 0; }
    .profile-header { display:flex; flex-wrap:wrap; gap:1rem; justify-content:space-between; align-items:flex-start; }
    .share-box { max-width:420px; }
    .share-link { word-break:break-all; font-size:.85rem; color:var(--text); }
  </style>
</head>
<body>
  <header>
    <strong><a href="/" style="color:var(--text);">Job Intelligence</a></strong>
    <nav>
      <a href="/">Upload resume</a>
      <a href="/ui/jobs">Jobs</a>
      <a href="/ui/dashboard">Dashboard</a>
      <a href="/ui/discover">Discover</a>
      <a href="/docs">API</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
