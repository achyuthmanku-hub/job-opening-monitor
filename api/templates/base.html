<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Job Intelligence Monitor{% endblock %}</title>
  <style>
    :root { --bg:#0f1419; --card:#1a2332; --text:#e7ecf3; --muted:#9aa7b8; --accent:#3b82f6; --good:#22c55e; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: ui-sans-serif, system-ui, sans-serif; background:var(--bg); color:var(--text); }
    a { color:var(--accent); text-decoration:none; }
    header { padding:1rem 1.5rem; border-bottom:1px solid #243044; display:flex; gap:1rem; align-items:center; }
    header nav a { margin-right:1rem; color:var(--muted); }
    header nav a:hover { color:var(--text); }
    main { max-width:1100px; margin:0 auto; padding:1.5rem; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:1rem; }
    .card { background:var(--card); border:1px solid #243044; border-radius:12px; padding:1rem; }
    .stat { font-size:2rem; font-weight:700; }
    .muted { color:var(--muted); font-size:.9rem; }
    table { width:100%; border-collapse:collapse; }
    th, td { text-align:left; padding:.6rem .4rem; border-bottom:1px solid #243044; vertical-align:top; }
    .score { color:var(--good); font-weight:700; }
    input { background:#111827; border:1px solid #374151; color:var(--text); padding:.5rem .75rem; border-radius:8px; }
    button { background:var(--accent); color:white; border:none; padding:.5rem .9rem; border-radius:8px; cursor:pointer; }
  </style>
</head>
<body>
  <header>
    <strong>Job Intelligence</strong>
    <nav>
      <a href="/">Dashboard</a>
      <a href="/ui/jobs">Jobs</a>
      <a href="/ui/matches">Matches</a>
      <a href="/ui/discover">Discover</a>
      <a href="/ui/settings">Settings</a>
      <a href="/docs">API Docs</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
