pack: fortune500
description: >
  Fortune 500 and major US employers with public ATS boards (Greenhouse, Ashby,
  Lever, Workday, Oracle, Amazon). Not every F500 company exposes a scrapeable
  board — this pack prioritizes reliable sources. Import, then run a scan.

