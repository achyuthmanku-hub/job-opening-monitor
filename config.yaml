# Copy to config.yaml and customize.

# How often to check (used by launchd installer; cron expression for reference)
schedule: "0 9,17 * * *"  # 9am and 5pm daily

# Only notify for jobs whose title/location contains any of these (case-insensitive).
keywords:
  - "software engineer"

# Request timeout in seconds
request_timeout: 30

# User-agent sent with HTTP requests
user_agent: "JobOpeningMonitor/1.0 (+personal job alert bot)"
