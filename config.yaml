# How often to check — hourly is required for the 1-5 hour posting window.
schedule: "0 * * * *"

# Role filter — matches job title only (case-insensitive).
keywords:
  - "software engineer"
  - "back End engineer"
  - "java developer"

filters:
  us_only: true
  posted_min_hours: 1
  posted_max_hours: 25

request_timeout: 30
user_agent: "JobOpeningMonitor/1.0 (+personal job alert bot)"
